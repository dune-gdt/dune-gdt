---
# CodeRabbit configuration. Schema: https://docs.coderabbit.ai/reference/yaml-template
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  tools:
    # dune-gdt's config.h is generated by CMake from config.h.cmake at configure time (it is a
    # build artifact, not checked in), and every translation unit does `#include "config.h"`.
    # Building the project requires the full vcpkg + DUNE toolchain. CodeRabbit runs these C/C++
    # analyzers on individual changed files without configuring/building the project, so config.h
    # and the DUNE include paths are never present. The result is `fatal error: 'config.h' file
    # not found` on every file: Infer crashes outright and clang-tidy/cppcheck emit false-positive
    # diagnostics. Disable them; CodeRabbit's LLM-based review is unaffected.
    fbinfer:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
