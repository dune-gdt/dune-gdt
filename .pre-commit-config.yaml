---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
    # mpfr is a verbatim copy of the upstream vcpkg port; do not rewrite its
    # patches (stripping context-line whitespace corrupts the diffs).
    exclude: "^\\.vcpkg-overlays/ports/mpfr/"
  - id: check-yaml
    args: [--allow-multiple-documents]
  - id: check-added-large-files
  - id: debug-statements
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: 'f4d7745e17a28aad7eed2f4874ca8d1568c11c4c' # frozen: v22.1.8
  hooks:
  - id: clang-format
    exclude: "^(pybind11)|^\\.vcpkg-overlays/ports/mpfr/"
- repo: https://github.com/google/yamlfmt
  rev: b5ca1890231d5e1e5181fef75a1be609d1e25029 # frozen: v0.21.0
  hooks:
  - id: yamlfmt
    exclude: ".clang-format|.clang-tidy"
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
  hooks:
  - id: actionlint
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # frozen: v0.15.22
  hooks:
  - id: ruff
  - id: ruff-format
- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: 'e2c2116d86a80e72e7146a06e68b7c228afc6319' # frozen: v0.6.13
  hooks:
  - id: cmake-format
    additional_dependencies: [pyyaml>=5.1] # see https://github.com/cheshirekow/cmake-format-precommit/pull/4#issuecomment-943444582
    exclude: "config.h.cmake|pybind11|^\\.vcpkg-overlays/ports/mpfr/"
    args: ["-i", "--config-files=.cmake_format.py"]
  - id: cmake-lint
    additional_dependencies: [pyyaml>=5.1] # see https://github.com/cheshirekow/cmake-format-precommit/pull/4#issuecomment-943444582
    exclude: "config.h.cmake|pybind11|^\\.vcpkg-overlays/ports/mpfr/"
    args: ["--config-files=.cmake_format.py"]
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 1a4bb160cab6417b3045e1b37b6b72449243e658 # frozen: 0.37.4
  hooks:
  - id: check-github-actions
    additional_dependencies:
    - pip_system_certs==4.0
  - id: check-dependabot
    additional_dependencies:
    - pip_system_certs==4.0
- repo: https://github.com/Mateusz-Grzelinski/actionlint-py
  rev: c04ed26e40637cab1aa9879c693832a9c120fb20 # frozen: v1.7.12.24
  hooks:
  - id: actionlint
    additional_dependencies: [pyflakes>=3.0.1, shellcheck-py>=0.9.0.5]
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
  hooks:
  - id: shellcheck
