---
name: Non-docker Build and Test

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  merge_group:
  workflow_dispatch:

# Add concurrency to cancel in-progress jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        submodules: recursive
        fetch-tags: true
        fetch-depth: 0

    - name: Restore build cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        # .vcpkg-root holds the vcpkg toolchain that VcpkgBootStrap.cmake bakes
        # into build/.../CMakeSystem.cmake. It must be cached together with build/,
        # otherwise the restored CMake config points at a toolchain that does not
        # exist on a fresh checkout and configure fails immediately.
        path: |
          build
          .vcpkg-root
        # Key on the inputs that determine the toolchain/manifest so the cache is
        # rebuilt when they change. The trailing-dash restore-key only matches
        # caches written by this (consistent) scheme, never the legacy build-only one.
        key: ${{ runner.os }}-build-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Drop stale build cache if vcpkg toolchain is missing
      run: |
        if [ -d build ] && [ ! -f .vcpkg-root/scripts/buildsystems/vcpkg.cmake ]; then
          echo "Restored build/ but .vcpkg-root toolchain is missing; clearing stale" \
               "build/ so CMake re-bootstraps vcpkg from scratch."
          rm -rf build
        fi

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Configure CMake
      id: configure_cmake
      run: cmake --preset=debug

    - name: Build
      run: cmake --build --preset=debug --parallel

    - name: Build test binaries
      run: |
        cmake --build --preset=debug --target test_binaries --parallel -- -l 2

    - name: Test with CTest
      run: |
        ctest --preset=debug

    - name: Save build cache
      if: ${{ success() && steps.configure_cmake.outcome == 'success' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          build
          .vcpkg-root
        key: ${{ runner.os }}-build-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}

    - name: Upload error logs (in case of failure)
      if: always() && (steps.configure_cmake.conclusion == 'failure')
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: linux_vcpkg_error-log
        path: |
          ${{ github.workspace }}/build/*/vcpkg-*.log
          ${{ github.workspace }}/.vcpkg-root/buildtrees/*/*.log

  build_wheels:
    name: Build wheels
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      matrix:
        python-version: ["3.13"] #, "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        submodules: recursive
        fetch-tags: true
        fetch-depth: 0

    - run: |
        ./.ci/make_docker_wheels.bash
      env:
        GDT_PYTHON_VERSION: ${{ matrix.python-version }}
        # mark this as a CI build (selects versioneer's pep440-pre style) and
        # provide a unique build number so every upload gets a distinct version
        CI: "true"
        GITHUB_RUN_NUMBER: ${{ github.run_number }}

    - name: Upload wheels
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: wheels_${{ matrix.python-version }}
        path: build/wheelhouse/final/
        if-no-files-found: error

  build_tutorials:
    name: Build tutorials docs (executes notebooks via myst-nb)
    runs-on: ubuntu-24.04
    needs: build_wheels
    timeout-minutes: 60
    env:
      # the tutorials are executed against the freshly built wheels (current,
      # git-derived version), not the stale dune-gdt release on PyPI
      PYTHON_VERSION: "3.13"

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        fetch-tags: true
        fetch-depth: 0

    # uv provides and manages the Python interpreter itself, so there is no
    # separate actions/setup-python step; all execution below goes through uv.
    - name: Set up uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # gate the uv cache to trusted runs (pushes/merge queue and same-repo
        # PRs); disable it for external-fork PRs so a fork cannot poison the cache
        enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    - name: Download freshly built wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheels_${{ env.PYTHON_VERSION }}
        path: wheelhouse/

    - name: Install system dependencies
      run: |
        # Do not fail the whole job if an unrelated third-party apt repo (e.g.
        # google-chrome on the GitHub runner) has a transient index mismatch; the
        # Ubuntu repos that provide xvfb/gmsh update fine.
        sudo apt-get update || true
        # xvfb for headless rendering; gmsh is shelled out to by pymor's gmsh
        # discretizer used in example__gmsh_grid; clang provides the builtin-header
        # resource dir (stddef.h & co.) that clangquill's bundled libclang needs to
        # parse the C++ API headers (see tutorials/source/conf.py:_clang_resource_dir)
        sudo apt-get install -y xvfb gmsh clang

    - name: Create the uv-managed virtualenv
      # uv downloads the requested CPython itself (no actions/setup-python needed).
      run: uv venv --python "${PYTHON_VERSION}" "${GITHUB_WORKSPACE}/.venv"

    - name: Install bindings and docs/visualisation extras
      run: |
        # install the built dune-xt/dune-gdt wheels (xt is an exact-version dep of gdt)
        uv pip install --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          --find-links wheelhouse/ wheelhouse/*.whl
        # docs + visualisation extras of the just-installed dune-gdt; the extra
        # contents are the single source of truth in python/{xt,gdt}/setup.py.in
        # (myst-nb executes the notebook cells; k3d provides visualize_function
        # rendering when the wheels were built with K3D).
        uv pip install --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          --find-links wheelhouse/ "dune-gdt[docs,visualisation]"

    - name: Fetch published benchmark reports
      # The benchmark-plots Sphinx directive reads the per-run nanobench JSON reports from this
      # directory. They live on the orphan `benchmarks` branch; if that branch does not exist yet
      # the script is a no-op and the docs render a placeholder note.
      run: |
        ./.ci/fetch_benchmark_reports.sh "${GITHUB_WORKSPACE}/build/benchmark_data"

    - name: Build tutorials (sphinx + myst-nb notebook execution)
      # Run from a neutral directory so the repo-root `dune/` source tree does not
      # shadow the installed bindings. Notebook execution is the actual test: myst-nb
      # is configured with nb_execution_raise_on_error=False, so a failing notebook
      # writes <out>/reports/<name>.err.log instead of aborting, and we fail the job
      # on those below. We intentionally do NOT pass sphinx -W, because intersphinx
      # inventory fetches emit network-dependent warnings unrelated to the tutorials.
      env:
        DUNE_GDT_BENCHMARK_DATA: ${{ github.workspace }}/build/benchmark_data
      run: |
        cd "${RUNNER_TEMP}"
        OUT="${GITHUB_WORKSPACE}/build/tutorials_html"
        # --no-project: ignore the repo-root pyproject stub; run in the venv built above
        xvfb-run -a uv run --no-project \
          --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          python -m sphinx --keep-going -j 1 -b html \
          "${GITHUB_WORKSPACE}/tutorials/source" "${OUT}"
        if compgen -G "${OUT}/reports/*.err.log" > /dev/null; then
          echo "::error::one or more executed tutorial notebooks failed (see dumped reports below)"
          exit 1
        fi

    - name: Dump notebook execution error reports
      # myst-nb writes a per-notebook traceback here for every cell that failed;
      # surface them directly in the job log so failures are diagnosable without
      # downloading the artifact
      if: failure()
      run: |
        shopt -s nullglob
        for f in "${GITHUB_WORKSPACE}"/build/tutorials_html/reports/*.err.log; do
          echo "::group::$(basename "${f}")"
          cat "${f}"
          echo "::endgroup::"
        done

    - name: Upload built tutorials HTML
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: tutorials_html
        path: build/tutorials_html
        if-no-files-found: warn

  deploy_docs:
    name: Deploy tutorials docs to GitHub Pages
    runs-on: ubuntu-24.04
    needs: build_tutorials
    # publish only on pushes to main; PRs and the merge queue build (above) but
    # never deploy. build_tutorials must have succeeded, so broken docs are not
    # published.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      # required by actions/deploy-pages for the GitHub Pages deployment
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # do not cancel an in-progress Pages deployment; let it finish before the next
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
    - name: Download built tutorials HTML
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: tutorials_html
        path: tutorials_html

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
      with:
        path: tutorials_html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  test_publish:
    name: Publish to Test PyPI
    runs-on: ubuntu-24.04
    needs: build_wheels
    # only publish to Test PyPI on pushes to main, never on PRs, the merge
    # queue, or manual runs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 120
    environment: test-pypi
    permissions:
      # IMPORTANT: this permission is mandatory for PyPi Trusted Publishing
      id-token: write

    steps:
    - name: Download wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: wheels_*
        merge-multiple: true
        path: wheels/
    - run: |
        ls -l wheels/*
      shell: bash
    - name: Upload wheels to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      id: upload-pypi_on_tag
      with:
        packages-dir: wheels/
        repository-url: https://test.pypi.org/legacy/
        verbose: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 120
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for PyPi Trusted Publishing
      id-token: write

    steps:
    - name: Download wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: wheels_*
        merge-multiple: true
        path: wheels/
    - run: |
        ls -l wheels/*
      shell: bash
    - name: Upload wheels to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        packages-dir: wheels/
        verbose: true
