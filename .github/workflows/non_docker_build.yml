---
name: Non-docker Build and Test

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  merge_group:
  workflow_dispatch:

# Cancel superseded in-progress PR runs, but never cancel a queued merge_group
# build or a push to main (each of those must run to completion).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Permissions are declared per job (least privilege) rather than at workflow level,
# as recommended by SonarCloud rule githubactions:S8264. The build jobs only need
# read access to repo contents; deploy_docs and test_publish/publish declare the
# extra scopes they require (pages / id-token write for Trusted Publishing).

jobs:
  # Path filter that drives the per-job `if:` conditions below. Lets a docs-only
  # change skip the heavy C++ matrix and the wheel build (the docs job then pulls
  # the last good wheels from main), while any code change still runs the full
  # pipeline. `push`/`workflow_dispatch` ignore the outputs and always run full.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # paths-filter reads the PR file list via the API on pull_request events
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
        # full history so the action can diff against the base for push/merge_group
        # (pull_request uses the API and needs no local history); no submodules/tags
        # are required just to enumerate changed paths.
        fetch-depth: 0
    - name: Filter paths
      id: filter
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      with:
        # pull_request: base auto-detected from the PR (omit). merge_group: diff
        # against the queue base. push: empty base lets the action use the before-sha.
        base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || '' }}
        ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_ref || github.ref }}
        filters: |
          docs:
            - 'docs/**'
          non_docs:
            - '**'
            - '!docs/**'
            - '!**/*.md'

  config:
    # Single source of truth for instance sizing. Everything downstream (the
    # runs-on cpu labels, the build -j, the ctest --parallel level) derives from
    # the vCPU counts set here, so changing instance size is a one-line edit and
    # the rest auto-adjusts. This indirection exists because GitHub Actions does
    # not expose the env: context inside runs-on:; job outputs (needs.*) are the
    # only workflow-local values usable there.
    name: CI sizing constants
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      linux_cpu: ${{ steps.sizing.outputs.linux_cpu }}
      linux_build_jobs: ${{ steps.sizing.outputs.linux_build_jobs }}
      ctest_parallel: ${{ steps.sizing.outputs.ctest_parallel }}
      wheels_cpu: ${{ steps.sizing.outputs.wheels_cpu }}
      docs_cpu: ${{ steps.sizing.outputs.docs_cpu }}
    steps:
    - id: sizing
      run: |
        # ---- change instance size here ----
        linux_cpu=8
        wheels_cpu=8
        docs_cpu=4
        # -----------------------------------
        # Fail fast on nonsensical sizes so a bad edit surfaces here (a cheap
        # GitHub-hosted job) instead of as a confusing "-j 0"/"--parallel 0" or an
        # invalid RunsOn cpu label deep in a self-hosted build. linux_cpu must be
        # >= 2 so linux_build_jobs (cpu-1) stays >= 1.
        for v in "$linux_cpu" "$wheels_cpu" "$docs_cpu"; do
          [[ "$v" =~ ^[0-9]+$ ]] || { echo "::error::cpu values must be positive integers (got '$v')"; exit 1; }
        done
        (( linux_cpu >= 2 )) || { echo "::error::linux_cpu must be >= 2 (got $linux_cpu)"; exit 1; }
        (( wheels_cpu >= 1 && docs_cpu >= 1 )) || { echo "::error::wheels_cpu/docs_cpu must be >= 1"; exit 1; }
        {
          echo "linux_cpu=$linux_cpu"
          echo "wheels_cpu=$wheels_cpu"
          echo "docs_cpu=$docs_cpu"
          # Cap compile concurrency by RAM: m7i = 4 GB/vCPU, template-heavy TUs
          # peak ~2 GB each, so cpu-1 keeps peak RAM well under the box.
          echo "linux_build_jobs=$((linux_cpu - 1))"
          # Tests are ~400 short, IO-light executables: oversubscribe at 2x vCPU.
          echo "ctest_parallel=$((linux_cpu * 2))"
        } >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build on Linux (${{ matrix.preset }})
    needs: [config, changes]
    # Two ANDed gates: (1) fork-trust — only run on the self-hosted RunsOn/AWS
    # fleet for trusted contexts (pushes/tags, the merge queue, same-repo PRs);
    # external fork PRs are skipped because fork code must never execute on the
    # fleet (arbitrary code execution risk; a GitHub-hosted fallback is a
    # follow-up). (2) path filter — skip the C++ matrix on docs-only/markdown-only
    # changes (push/dispatch always run full).
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.non_docs == 'true')
    # Trial running on RunsOn self-hosted runners (https://runs-on.com). The
    # run_id routing label is suffixed with the matrix preset so each leg
    # provisions its own ephemeral instance instead of competing for one.
    runs-on:
    - runs-on=${{ github.run_id }}-${{ matrix.preset }}
    - cpu=${{ needs.config.outputs.linux_cpu }}
    # r7i (memory-optimized, 8 GB/vCPU -> 64 GB at cpu=8). The Python bindings are
    # the memory driver: their pybind11 TUs instantiate deeply-nested Dune templates
    # and peak well above the ~2 GB/TU of the test binaries, so building them at the
    # shared -j cpu-1 (see below) OOM-killed the 32 GB m7i mid-step on a cold ccache
    # (the runner vanished, leaving the step stuck in-progress). The 64 GB here keeps
    # the -j7 bindings compile (~7 * ~8 GB) under memory. Neither preset uses LTO, so
    # there is no /tmp ltrans explosion like build_wheels.
    - family=r7i
    - image=ubuntu24-full-x64
    # build/ tree + .vcpkg-root + 2 GB ccache fit easily; 80 GB gp3 leaves ample
    # headroom and the runner is a short-lived spot instance, so the extra storage
    # is negligible.
    - volume=80gb
    - extras=s3-cache
    # A fully cold leg (no build cache) compiles every vcpkg dependency as a shared
    # library, the project, the ~400 test binaries and the Python bindings from
    # scratch; on the m7i fleet that fits well under 3h. Warm runs restore the
    # build/ + ccache and finish in well under an hour.
    timeout-minutes: 180
    permissions:
      contents: read
      # codecov's GitHub Action authenticates to codecov.io via OpenID Connect
      # (use_oidc below) instead of an upload token. Only the coverage matrix leg
      # actually exchanges this token, but job-level permissions are shared by the
      # whole matrix, so the scope is declared once here.
      id-token: write
    strategy:
      # one leg's failure must not cancel the other: a broken debug build should
      # still let the release+coverage leg report, and vice versa.
      fail-fast: false
      matrix:
        include:
        # the stock debug build (no instrumentation)
        - preset: debug
          coverage: false
        # the release build compiled with gcov instrumentation (release_coverage
        # preset) so it can report C++ (and, via the bindings, Python) coverage
        - preset: release_coverage
          coverage: true
    env:
      # Compiler-level cache. Unlike the build/ cache (keyed on the vcpkg/preset
      # hash), the ccache survives manifest changes and partial rebuilds, so the
      # 400+ test-binary translation units stay warm across runs.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "2G"

    steps:
    # Configures the RunsOn Magic Cache sidecar so the actions/cache steps below
    # transparently use S3 (extras=s3-cache). No-op on GitHub-hosted runners, so it
    # stays safe if this job ever falls back to ubuntu-24.04.
    - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        submodules: recursive
        fetch-tags: true
        fetch-depth: 0

    - name: Restore build cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        # .vcpkg-root holds the vcpkg toolchain that VcpkgBootStrap.cmake bakes
        # into build/.../CMakeSystem.cmake. It must be cached together with build/,
        # otherwise the restored CMake config points at a toolchain that does not
        # exist on a fresh checkout and configure fails immediately.
        path: |
          build
          .vcpkg-root
        # Key on the inputs that determine the toolchain/manifest so the cache is
        # rebuilt when they change. The matrix preset is part of the key so the two
        # legs never clobber each other's build/ (they instrument differently and
        # live in build/<preset>). The trailing-dash restore-key only matches caches
        # written by this (consistent) scheme, never the legacy build-only one.
        # Note the cached dune-env virtualenv is never reused: it is deleted right
        # after restore (see "Discard cached dune-env virtualenv" below), so a stale
        # or corrupted venv in the cache cannot break configure.
        key: ${{ runner.os }}-build-v2-${{ matrix.preset }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}
        restore-keys: |
          ${{ runner.os }}-build-v2-${{ matrix.preset }}-

    - name: Drop stale build cache if vcpkg toolchain is missing
      run: |
        if [ -d build ] && [ ! -f .vcpkg-root/scripts/buildsystems/vcpkg.cmake ]; then
          echo "Restored build/ but .vcpkg-root toolchain is missing; clearing stale" \
               "build/ so CMake re-bootstraps vcpkg from scratch."
          rm -rf build
        fi

    - name: Discard cached dune-env virtualenv
      # The dune-env virtualenv inside build/ must not be reused across runs: a
      # cached venv can hold a dune-common Python package whose version differs
      # from the current vcpkg wheelhouse, and the in-configure pip downgrade that
      # follows is fragile (an interrupted uninstall leaves a half-removed
      # "~une-common" distribution and a dune package without __main__, failing
      # configure with "Dune python package could not be found"). Deleting the
      # venv here makes dune-common's CMake recreate it during configure and
      # install the wheels from the current wheelhouse — a few seconds of work
      # that removes this whole class of random merge-queue failures.
      run: rm -rf build/*/dune-env

    - name: Install dependencies
      run: |
        sudo apt-get update
        # xvfb gives the Python binding tests a headless display; both legs run
        # those tests. gcovr is pulled separately (coverage leg only) via pipx.
        sudo apt-get install -y ninja-build ccache xvfb

    - name: Install coverage tooling
      # gcovr turns the gcov .gcda/.gcno files produced by the instrumented build
      # into a Cobertura XML report codecov understands. Only needed on the
      # coverage leg, which alone compiles with instrumentation.
      if: ${{ matrix.coverage }}
      run: pipx install gcovr

    - name: Set up uv
      # Both legs run the Python test suite, which the CMake xt_test_python /
      # gdt_test_python targets execute via `uv run` (no manually-managed venv).
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # gate the uv cache to trusted runs (pushes/merge queue and same-repo
        # PRs); disable it for external-fork PRs so a fork cannot poison the cache
        enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    - name: Restore ccache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ github.workspace }}/.ccache
        # run_id makes every save a unique (always-miss) key so each run writes a
        # fresh cache; the prefix restore-key then pulls the most recent ccache
        # from any previous run. Keyed per preset because the instrumented release
        # objects must not pollute the debug leg's cache (different compile flags).
        key: ${{ runner.os }}-ccache-${{ matrix.preset }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ matrix.preset }}-

    - name: Configure CMake
      id: configure_cmake
      # Route every compile through ccache. Passing the launcher as a cache
      # variable (not just an env var) forces CMake to regenerate the Ninja
      # rules even when a stale build/ tree is restored from cache. The gcov
      # instrumentation lives in the release_coverage preset (see
      # CMakePresets.json), so nothing extra is injected here.
      run: >
        cmake --preset=${{ matrix.preset }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build --preset=${{ matrix.preset }} --parallel

    - name: Build test binaries
      run: |
        # test_binaries is ~400 separate executables, several of which are
        # template-heavy TUs that peak around ~2 GB RAM each. Cap concurrency by
        # memory: -j cpu-1 (linux_build_jobs from the config job) keeps peak RAM
        # (~2 GB * (cpu-1)) well under the m7i runner (4 GB/vCPU) while using all
        # but one of its vCPUs. With a warm ccache most of these are cache hits.
        cmake --build --preset=${{ matrix.preset }} --target test_binaries --parallel -- -j ${{ needs.config.outputs.linux_build_jobs }}
        ccache --show-stats

    - name: Test with CTest
      run: |
        # Run the ~400 test executables concurrently. ctest_parallel (2x vCPU,
        # from the config job) oversubscribes since the tests are short/IO-light.
        ctest --preset=${{ matrix.preset }} --parallel ${{ needs.config.outputs.ctest_parallel }}

    - name: Build Python bindings
      # Both legs run the Python test suite, so both build the .so bindings.
      run: cmake --build --preset=${{ matrix.preset }} --target bindings --parallel -- -j ${{ needs.config.outputs.linux_build_jobs }}

    - name: Run Python tests (with coverage)
      # The xt_test_python / gdt_test_python targets run pytest with --cov and
      # write coverage.py data files (coverage-xt, coverage-gdt) into the build
      # dir. xvfb-run wraps the whole invocation so any visualisation-backed test
      # has a display. We intentionally skip the test_docs target (notebook
      # execution) here — that is covered by the build_docs job. The coverage.py
      # data is only converted and uploaded on the coverage leg below.
      run: |
        xvfb-run -a cmake --build --preset=${{ matrix.preset }} \
          --target xt_test_python gdt_test_python

    - name: Collect C++ coverage (gcovr -> Cobertura XML)
      if: ${{ matrix.coverage }}
      run: |
        gcovr \
          --root "${GITHUB_WORKSPACE}" \
          --filter "${GITHUB_WORKSPACE}/dune/" \
          --gcov-ignore-parse-errors \
          --exclude-unreachable-branches \
          --exclude-throw-branches \
          --print-summary \
          --xml-pretty -o "${GITHUB_WORKSPACE}/coverage-cpp.xml" \
          "${GITHUB_WORKSPACE}/build/${{ matrix.preset }}"

    - name: Collect Python coverage (coverage.py -> XML)
      if: ${{ matrix.coverage }}
      run: |
        # the pytest run wrote two coverage.py data files (coverage-xt,
        # coverage-gdt) into the build dir; combine them into one XML. coverage is
        # pulled on the fly by uv (no manually-managed venv), matching the rest of
        # the Python tooling in this job.
        cd "${GITHUB_WORKSPACE}/build/${{ matrix.preset }}"
        uv run --no-project --with coverage python -m coverage combine coverage-xt coverage-gdt
        uv run --no-project --with coverage python -m coverage xml -o "${GITHUB_WORKSPACE}/coverage-python.xml"

    - name: Upload C++ coverage to Codecov
      if: ${{ matrix.coverage }}
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        # OIDC (id-token) auth instead of an upload token; see job permissions.
        use_oidc: true
        files: ${{ github.workspace }}/coverage-cpp.xml
        flags: cpp
        # We already produced the Cobertura XML with gcovr above; stop the action
        # from searching the tree and from running its own coverage plugins (the
        # gcov plugin would otherwise re-run gcov over the whole build tree).
        disable_search: true
        plugins: noop
        # fail the job if the upload fails, so coverage reporting cannot silently
        # break (requires the repo to be activated on codecov.io).
        fail_ci_if_error: true

    - name: Upload Python coverage to Codecov
      if: ${{ matrix.coverage }}
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        use_oidc: true
        files: ${{ github.workspace }}/coverage-python.xml
        flags: python
        disable_search: true
        plugins: noop
        fail_ci_if_error: true

    - name: Save build cache
      # Save when configure succeeded even if a later step (build/test/coverage
      # upload) failed: a fully cold run rebuilds every vcpkg dependency as a
      # shared library and the whole project, which is far too expensive to redo
      # on every retry. Persisting build/ here lets the next run start warm and
      # converge, mirroring the always() ccache save below. The fork-trust gate is
      # repeated here (defence-in-depth + cache-poisoning lint on a standalone save
      # step); the job-level `if` already blocks fork PRs.
      if: always() && steps.configure_cmake.outcome == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          build
          .vcpkg-root
        key: ${{ runner.os }}-build-v2-${{ matrix.preset }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}

    - name: Save ccache
      # Always persist the compiler cache (even when the build or tests fail) so
      # the next run starts warm. Only requires that configure succeeded, since
      # that is what populates the cache directory. The fork-trust gate is repeated
      # here (defence-in-depth + cache-poisoning lint) as on the build cache above.
      if: always() && steps.configure_cmake.outcome == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ matrix.preset }}-${{ github.run_id }}

    - name: Upload error logs (in case of failure)
      if: always() && (steps.configure_cmake.conclusion == 'failure')
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: linux_vcpkg_error-log_${{ matrix.preset }}
        path: |
          ${{ github.workspace }}/build/*/vcpkg-*.log
          ${{ github.workspace }}/.vcpkg-root/buildtrees/*/*.log

  build_wheels:
    name: Build wheels
    needs: [config, changes]
    # Two ANDed gates: (1) fork-trust — only run on trusted contexts (pushes/tags,
    # the merge queue, same-repo PRs); fork PRs must never execute on the
    # self-hosted RunsOn/AWS fleet (arbitrary code execution risk). (2) path
    # filter — skip on docs-only/markdown-only changes; build_docs then sources the
    # wheels from the last successful main build instead of rebuilding them here.
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.non_docs == 'true')
    # Trial running on RunsOn self-hosted runners (https://runs-on.com). The label
    # list selects an 8-vCPU c7i EC2 instance with the ubuntu24-full image; the
    # extras=s3-cache label enables the RunsOn S3-backed Magic Cache, which the
    # runs-on/action step below wires into actions/cache.
    runs-on:
    - runs-on=${{ github.run_id }}
    - cpu=${{ needs.config.outputs.wheels_cpu }}
    # m7i (general-purpose, 4 GB/vCPU -> 32 GB at cpu=8). c7i is compute-optimized
    # at 2 GB/vCPU = only 16 GB, which OOMs the -j7 compile in build-wheels.sh.
    # build-wheels.sh builds at -j "$(nproc --ignore 1)", so its compile
    # parallelism auto-scales with whatever cpu the config job provisions.
    - family=m7i
    - image=ubuntu24-full-x64
    # Enlarge the root EBS volume. The release build links with LTO, and at -j7 it
    # runs several LTO links in parallel, each spilling many large *.ltrans.o
    # intermediates into /tmp. On the default disk this overruns the volume and the
    # link dies with "No space left on device"; 150 GB gp3 leaves ample headroom
    # for the LTO scratch plus the manylinux image, ccache, and build tree. The
    # volume is on a short-lived spot runner, so the extra storage is negligible.
    - volume=150gb
    - extras=s3-cache
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.13"] #, "3.9", "3.10", "3.11", "3.12"]

    steps:
    # Configures the RunsOn Magic Cache sidecar so the actions/cache step below
    # transparently uses S3. No-op on GitHub-hosted runners, so it stays safe if
    # this job ever falls back to ubuntu-24.04.
    - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        submodules: recursive
        fetch-tags: true
        fetch-depth: 0

    - name: Restore wheel-build ccache
      # build-wheels.sh sets CCACHE_DIR to build/wheelhouse/cache (on the host
      # bind-mount), so the compiler cache survives between runs. Routed to RunsOn
      # S3 via extras=s3-cache + the runs-on/action step above. Split into
      # restore/save (rather than the unified action) so the write can be gated to
      # trusted contexts, matching build-linux and avoiding cache poisoning.
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: build/wheelhouse/cache
        # Unique per-run key so the save below always writes a fresh cache; the
        # restore-key falls back to the most recent cache for this Python version.
        key: ${{ runner.os }}-wheels-ccache-${{ matrix.python-version }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-wheels-ccache-${{ matrix.python-version }}-

    - name: Restore vcpkg deps (toolchain + installed packages)
      # ccache only covers the dune-xt/dune-gdt translation units; the vcpkg
      # dependency ports build with vcpkg's own toolchain and are not cached by
      # ccache. Cache ONLY the relocatable, expensive artifacts -- the vcpkg
      # toolchain (.vcpkg-root) and the installed packages (vcpkg_installed) -- not
      # the whole configured build/wheelbuilder-release tree: its CMakeCache and
      # generated rules embed state tied to the per-run venv (ninja path, the dune
      # python package), so reusing it makes a warm reconfigure skip the dune
      # install and then fail ("No module named dune"). Reconfiguring fresh each
      # run (vcpkg sees vcpkg_installed and skips the dep rebuild) avoids that whole
      # class of staleness while still skipping the ~35 min dependency build. Both
      # paths live under the source dir bind-mounted into the container. Keyed on
      # the inputs that determine the toolchain/manifest.
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          build/wheelbuilder-release/vcpkg_installed
          .vcpkg-root
        key: ${{ runner.os }}-wheels-vcpkg-${{ matrix.python-version }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}
        restore-keys: |
          ${{ runner.os }}-wheels-vcpkg-${{ matrix.python-version }}-

    - name: Drop stale vcpkg_installed if toolchain is missing
      # If vcpkg_installed was restored (via the trailing-dash restore-key) but the
      # .vcpkg-root toolchain it was built against is absent, clear it so vcpkg
      # reinstalls cleanly instead of configure failing on a missing toolchain.
      run: |
        if [ -d build/wheelbuilder-release/vcpkg_installed ] && [ ! -f .vcpkg-root/scripts/buildsystems/vcpkg.cmake ]; then
          echo "Restored vcpkg_installed but .vcpkg-root toolchain is missing;" \
               "clearing it so vcpkg reinstalls from scratch."
          rm -rf build/wheelbuilder-release/vcpkg_installed
        fi

    - run: |
        ./.ci/make_docker_wheels.bash
      env:
        GDT_PYTHON_VERSION: ${{ matrix.python-version }}
        # mark this as a CI build (selects versioneer's pep440-pre style) and
        # provide a unique build number so every upload gets a distinct version
        CI: "true"
        GITHUB_RUN_NUMBER: ${{ github.run_number }}

    - name: Dump vcpkg build error logs
      # On failure, surface vcpkg's per-port error logs directly in the job log
      # so the cause is visible without downloading the artifact below. vcpkg
      # writes these inside the container as root, so freshly created buildtree
      # dirs are not traversable by the unprivileged runner -> read them via sudo.
      if: failure()
      run: |
        # Only the per-port error logs (not the multi-MB vcpkg-manifest-install.log,
        # which would bury the real error in the retrievable log tail); the full
        # set is still captured by the artifact upload below.
        sudo find .vcpkg-root/buildtrees -type f \
          \( -name '*-err.log' -o -name 'git-fetch-*' \) \
          2>/dev/null | sort | while read -r f; do
          echo "::group::${f}"
          sudo cat "${f}" || true
          echo "::endgroup::"
        done

    - name: Upload vcpkg error logs (in case of failure)
      # Companion downloadable artifact, mirroring the build-linux job's
      # "Upload error logs" step.
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: wheels_vcpkg_error-log_${{ matrix.python-version }}
        path: |
          .vcpkg-root/buildtrees/*/*.log
          build/wheelbuilder-release/vcpkg-*.log
        if-no-files-found: warn

    - name: Save wheel-build ccache
      # Persist the compiler cache even when the build fails so the next run stays
      # warm. The job-level `if` already blocks fork PRs; the same trust gate is
      # repeated here as defence-in-depth (and to satisfy the cache-poisoning lint
      # on a standalone save step).
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: build/wheelhouse/cache
        key: ${{ runner.os }}-wheels-ccache-${{ matrix.python-version }}-${{ github.run_id }}

    - name: Save vcpkg deps (toolchain + installed packages)
      # Persist the vcpkg toolchain + installed packages keyed on the manifest hash
      # so the next run with an unchanged vcpkg.json/preset/bootstrap skips the
      # dependency rebuild. Gated on success() (unlike the ccache save above):
      # the key is deterministic and actions/cache keys are immutable, so saving a
      # partial/corrupt set from a failed run would poison the cache permanently
      # (a later good run could not overwrite the same key). The repeated fork-trust
      # gate is defence-in-depth.
      if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          build/wheelbuilder-release/vcpkg_installed
          .vcpkg-root
        key: ${{ runner.os }}-wheels-vcpkg-${{ matrix.python-version }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'cmake/VcpkgBootStrap.cmake') }}

    - name: Upload wheels
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: wheels_${{ matrix.python-version }}
        path: build/wheelhouse/final/
        if-no-files-found: error

  build_docs:
    name: Build docs (executes notebooks via myst-nb)
    needs: [config, build_wheels, changes]
    # Gates (all ANDed): (1) fork-trust, same as build_wheels (also satisfies the
    # cache-poisoning lint on the uv cache below). (2) build_wheels reached a valid
    # terminal state — success (use its artifact) or skipped/docs-only (pull the
    # wheels from the last main build below); a failed/cancelled build_wheels leaves
    # no usable wheel, so docs is skipped and ci-gate reports the upstream failure.
    # (3) path filter — rebuild docs on any code or docs change (notebook execution
    # doubles as a bindings smoke test); only markdown-outside-docs changes skip it.
    if: >-
      !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (needs.build_wheels.result == 'success' || needs.build_wheels.result == 'skipped') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' ||
       needs.changes.outputs.non_docs == 'true' || needs.changes.outputs.docs == 'true')
    # Trial running on RunsOn self-hosted runners (https://runs-on.com). The docs
    # build is single-threaded (sphinx -j 1), so 4 vCPU / 16 GB (m7i) is plenty and
    # no volume bump is needed (it only downloads the wheels artifact and renders
    # HTML). extras=s3-cache + the runs-on/action step route setup-uv's cache to S3.
    runs-on:
    - runs-on=${{ github.run_id }}
    - cpu=${{ needs.config.outputs.docs_cpu }}
    - family=m7i
    - image=ubuntu24-full-x64
    - extras=s3-cache
    timeout-minutes: 60
    permissions:
      contents: read
      # needed to look up and download the wheel artifact from another run on
      # docs-only PRs (see "Resolve last successful main build" below)
      actions: read
    env:
      # the documentation notebooks are executed against the freshly built wheels
      # (current, git-derived version), not the stale dune-gdt release on PyPI
      PYTHON_VERSION: "3.13"

    steps:
    # Configures the RunsOn Magic Cache sidecar so setup-uv's cache (gated below)
    # transparently uses S3 (extras=s3-cache). No-op on GitHub-hosted runners.
    - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # this checkout's token is not used for any later git push/API call
        persist-credentials: false
        fetch-tags: true
        fetch-depth: 0

    # uv provides and manages the Python interpreter itself, so there is no
    # separate actions/setup-python step; all execution below goes through uv.
    - name: Set up uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # gate the uv cache to trusted runs (pushes/merge queue and same-repo
        # PRs); disable it for external-fork PRs so a fork cannot poison the cache
        enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    - name: Download freshly built wheels
      # the normal path: build_wheels ran in this same workflow run (code change,
      # push or merge queue) and uploaded the artifact
      if: needs.build_wheels.result == 'success'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheels_${{ env.PYTHON_VERSION }}
        path: wheelhouse/

    - name: Resolve last successful main build
      # docs-only change: build_wheels was skipped, so find the most recent
      # successful run of this workflow on main to source the wheels from.
      if: needs.build_wheels.result == 'skipped'
      id: last_main
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'non_docker_build.yml',
            branch: 'main',
            status: 'success',
            per_page: 1,
          });
          if (runs.data.total_count === 0) {
            core.setFailed('no successful main build found to source wheels from');
            return;
          }
          core.setOutput('run_id', String(runs.data.workflow_runs[0].id));

    - name: Download wheels from last successful main build
      # docs-only change: pull the wheel artifact produced by the run resolved above.
      # Gate on last_main success too: a custom if: drops the implicit success()
      # check, so without it a failed resolve (no main build found) would still run
      # this with an empty run-id and mask the real error.
      if: needs.build_wheels.result == 'skipped' && steps.last_main.outcome == 'success'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheels_${{ env.PYTHON_VERSION }}
        path: wheelhouse/
        run-id: ${{ steps.last_main.outputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install system dependencies
      run: |
        # Do not fail the whole job if an unrelated third-party apt repo (e.g.
        # google-chrome on the GitHub runner) has a transient index mismatch; the
        # Ubuntu repos that provide xvfb/gmsh update fine.
        sudo apt-get update || true
        # xvfb for headless rendering; gmsh is shelled out to by pymor's gmsh
        # discretizer used in example__gmsh_grid; clang provides the builtin-header
        # resource dir (stddef.h & co.) that clangquill's bundled libclang needs to
        # parse the C++ API headers (see docs/source/conf.py:_clang_resource_dir)
        sudo apt-get install -y xvfb gmsh clang

    - name: Create the uv-managed virtualenv
      # uv downloads the requested CPython itself (no actions/setup-python needed).
      run: uv venv --python "${PYTHON_VERSION}" "${GITHUB_WORKSPACE}/.venv"

    - name: Install bindings and docs/visualisation extras
      run: |
        # install the built dune-xt/dune-gdt wheels (xt is an exact-version dep of gdt)
        uv pip install --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          --find-links wheelhouse/ wheelhouse/*.whl
        # docs + visualisation extras of the just-installed dune-gdt; the extra
        # contents are the single source of truth in python/xt/pyproject.toml
        # (myst-nb executes the notebook cells; k3d provides visualize_function
        # rendering when the wheels were built with K3D).
        uv pip install --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          --find-links wheelhouse/ "dune-gdt[docs,visualisation]"

    - name: Fetch published benchmark reports
      # The benchmark-plots Sphinx directive reads the per-run nanobench JSON reports from this
      # directory. They live on the orphan `benchmarks` branch; if that branch does not exist yet
      # the script is a no-op and the docs render a placeholder note.
      run: |
        ./.ci/fetch_benchmark_reports.sh "${GITHUB_WORKSPACE}/build/benchmark_data"

    - name: Build docs (sphinx + myst-nb notebook execution)
      # Run from a neutral directory so the repo-root `dune/` source tree does not
      # shadow the installed bindings. Notebook execution is the actual test: myst-nb
      # is configured with nb_execution_raise_on_error=False, so a failing notebook
      # writes <out>/reports/<name>.err.log instead of aborting, and we fail the job
      # on those below. We intentionally do NOT pass sphinx -W, because intersphinx
      # inventory fetches emit network-dependent warnings unrelated to the docs build.
      env:
        DUNE_GDT_BENCHMARK_DATA: ${{ github.workspace }}/build/benchmark_data
      run: |
        cd "${RUNNER_TEMP}"
        OUT="${GITHUB_WORKSPACE}/build/docs_html"
        # --no-project: ignore the repo-root pyproject stub; run in the venv built above
        xvfb-run -a uv run --no-project \
          --python "${GITHUB_WORKSPACE}/.venv/bin/python" \
          python -m sphinx --keep-going -j auto -b html \
          "${GITHUB_WORKSPACE}/docs/source" "${OUT}"
        if compgen -G "${OUT}/reports/*.err.log" > /dev/null; then
          echo "::error::one or more executed documentation notebooks failed (see dumped reports below)"
          exit 1
        fi

    - name: Dump notebook execution error reports
      # myst-nb writes a per-notebook traceback here for every cell that failed;
      # surface them directly in the job log so failures are diagnosable without
      # downloading the artifact
      if: failure()
      run: |
        shopt -s nullglob
        for f in "${GITHUB_WORKSPACE}"/build/docs_html/reports/*.err.log; do
          echo "::group::$(basename "${f}")"
          cat "${f}"
          echo "::endgroup::"
        done

    - name: Upload built docs HTML
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docs_html
        path: build/docs_html
        if-no-files-found: warn

  deploy_docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-24.04
    needs: build_docs
    # publish only on pushes to main; PRs and the merge queue build (above) but
    # never deploy. build_docs must have succeeded, so broken docs are not
    # published.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      # required by actions/deploy-pages for the GitHub Pages deployment
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # do not cancel an in-progress Pages deployment; let it finish before the next
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
    - name: Download built docs HTML
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docs_html
        path: docs_html

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: docs_html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  test_publish:
    name: Publish to Test PyPI
    runs-on: ubuntu-24.04
    needs: build_wheels
    # only publish to Test PyPI on pushes to main, never on PRs, the merge
    # queue, or manual runs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 120
    environment: test-pypi
    permissions:
      # IMPORTANT: this permission is mandatory for PyPi Trusted Publishing
      id-token: write

    steps:
    - name: Download wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: wheels_*
        merge-multiple: true
        path: wheels/
    - run: |
        ls -l wheels/*
      shell: bash
    - name: Upload wheels to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      id: upload-pypi_on_tag
      with:
        packages-dir: wheels/
        repository-url: https://test.pypi.org/legacy/
        verbose: true

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 120
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for PyPi Trusted Publishing
      id-token: write

    steps:
    - name: Download wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: wheels_*
        merge-multiple: true
        path: wheels/
    - run: |
        ls -l wheels/*
      shell: bash
    - name: Upload wheels to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        packages-dir: wheels/
        verbose: true

  # Single aggregating "control check". This is the ONLY status check that branch
  # protection / the merge queue should require: it always runs (even when upstream
  # jobs are skipped by the path filter or fail), and it resolves green when every
  # needed job either succeeded or was skipped, red when any failed or was cancelled.
  # That makes path-based skipping safe — a skipped job no longer leaves a required
  # check pending forever. Matrix job results aggregate (any failed leg => failure).
  ci-gate:
    name: CI gate
    runs-on: ubuntu-24.04
    permissions: {}
    if: always()
    needs: [changes, config, build-linux, build_wheels, build_docs]
    steps:
    - name: Decide gate result
      env:
        RESULTS: ${{ join(needs.*.result, ' ') }}
      run: |
        echo "needed job results: ${RESULTS}"
        for r in ${RESULTS}; do
          if [ "${r}" = "failure" ] || [ "${r}" = "cancelled" ]; then
            echo "::error::a required job ended with result '${r}'"
            exit 1
          fi
        done
        echo "all required jobs passed or were skipped"
