---
name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Add concurrency to cancel in-progress jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - run: false

