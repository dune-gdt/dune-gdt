---
name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one benchmark run at a time; do not cancel an in-progress run (we want every push to main
# to produce a report).
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # required to push the JSON reports onto the `benchmarks` branch
  contents: write

jobs:
  benchmarks:
    name: Build and run benchmarks (Release)
    runs-on: ubuntu-26.04
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        # the publish step pushes from a separate temp clone whose origin URL
        # already embeds ${GITHUB_TOKEN}, so this checkout's token is not used
        persist-credentials: false
        submodules: recursive
        fetch-tags: true
        fetch-depth: 0

    - name: Free disk space
      # vcpkg builds every dependency from source; the runner's preinstalled SDKs
      # (Android, .NET, Haskell, ...) are unused here and just eat into that budget.
      run: ./.ci/free_disk_space.bash

    # The build/ tree and .vcpkg-root toolchain are intentionally NOT cached (see
    # non_docker_build.yml): a corrupted restore was repeatedly failing builds, so
    # each run bootstraps vcpkg and configures from scratch.
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Configure CMake
      id: configure_cmake
      run: cmake --preset=release

    - name: Build benchmarks
      run: cmake --build --preset=release --target benchmarks --parallel

    - name: Run benchmarks
      # the commit being benchmarked is embedded into each JSON report's "meta" block so the
      # documentation plots can label every data point (see benchmarks/benchmark_common.hh)
      env:
        DUNE_GDT_BENCHMARK_GIT_REVISION: ${{ github.sha }}
      run: cmake --build --preset=release --target run_benchmarks

    - name: Upload benchmark reports artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: benchmark-reports
        path: build/release/benchmarks/reports/*.json
        if-no-files-found: error

    - name: Publish reports to the benchmarks branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        reports_src="${GITHUB_WORKSPACE}/build/release/benchmarks/reports"
        if ! ls "${reports_src}"/*.json >/dev/null 2>&1; then
          echo "::error::no benchmark reports found in ${reports_src}"
          exit 1
        fi
        ts="$(date -u +%Y%m%d-%H%M%S)"
        sha="$(git rev-parse --short HEAD)"
        remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        work="$(mktemp -d)"
        # check out the existing benchmarks branch, or start a fresh orphan branch
        if git ls-remote --exit-code --heads "${remote}" benchmarks >/dev/null 2>&1; then
          git clone --depth 1 --branch benchmarks "${remote}" "${work}"
          cd "${work}"
        else
          git clone --depth 1 "${remote}" "${work}"
          cd "${work}"
          git checkout --orphan benchmarks
          git rm -rf . >/dev/null 2>&1 || true
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        dest="reports/${ts}-${sha}"
        mkdir -p "${dest}" "reports/latest"
        cp "${reports_src}"/*.json "${dest}/"
        rm -f reports/latest/*.json
        cp "${reports_src}"/*.json "reports/latest/"
        git add reports
        if git diff --cached --quiet; then
          echo "no changes to commit"
          exit 0
        fi
        git commit -m "benchmark reports for ${sha} (${ts} UTC)"
        n=0
        until [ "${n}" -ge 4 ]; do
          if git push "${remote}" benchmarks; then
            break
          fi
          n=$((n + 1))
          echo "push failed, retry ${n} ..."
          sleep "$((2 ** n))"
        done
        if [ "${n}" -ge 4 ]; then
          echo "::error::failed to push benchmark reports after retries"
          exit 1
        fi
