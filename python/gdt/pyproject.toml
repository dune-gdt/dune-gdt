[build-system]
requires = ['setuptools>=61', 'wheel', 'packaging']
build-backend = "setuptools.build_meta"

[project]
name = "dune.gdt"
description = "Python bindings for dune-gdt"
readme = "README.md"
# LICENSE.txt is bundled into the wheel via setup.cfg ([metadata] license_file); we intentionally do not set a [project]
# license field, as the dual BSD-2-Clause / GPL-2.0+ license is not a single SPDX expression.
authors = [{ name = "The dune-gdt devs", email = "felix.schindler@uni-muenster.de" }]
# version, dependencies and the optional-dependencies are supplied by setup.py: they all pin dune.xt to the exact same
# version, which is read from the CMake-generated dune/gdt/_version.py.
dynamic = ["version", "dependencies", "optional-dependencies"]

[project.urls]
Homepage = "https://github.com/dune-gdt/dune-gdt"

# Package discovery, the `dune` namespace package and the .so package data are configured in setup.py, alongside the
# BinaryDistribution wheel forcing.
